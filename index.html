<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовий Термінал V2</title>
    <style>
        body { background-color: black; color: #00FF00; font-family: monospace; padding: 20px; text-align: center; }
        #status { color: yellow; font-weight: bold; font-size: 1.4em; margin-bottom: 20px; }
        #btn { background: #00FF00; color: black; border: none; padding: 15px 30px; font-size: 1.2em; font-family: monospace; cursor: pointer; font-weight: bold; }
        #console { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .log { margin: 5px 0; color: #00FF00; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="status">Натисніть кнопку для запуску запису</div>
    <button id="btn" onclick="startAudioSystem()">УВІМКНУТИ МІКРОФОН</button>
    <div id="console"></div>

    <script>
        const laptopIp = '100.72.222.179'; 
        const port = '6752';
        
        let mediaRecorder;
        let audioChunks = [];
        const statusDiv = document.getElementById('status');
        const consoleDiv = document.getElementById('console');

        async function startAudioSystem() {
            document.getElementById('btn').style.display = 'none';
            statusDiv.innerText = "Запитую доступ до мікрофона...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusDiv.innerText = "Мікрофон успішно увімкнено! Слухаю постійно...";
                
                // Налаштовуємо постійний запис звуку шматочками
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        sendAudioToServer(event.data);
                    }
                };

                // Кожні 4 секунди завершуємо шматок і автоматом починаємо новий без переривання мікрофона
                setInterval(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                        mediaRecorder.start();
                    }
                }, 4000);

                mediaRecorder.start();

            } catch (err) {
                statusDiv.innerText = "Помилка доступу до мікрофона: " + err.message;
            }
        }

        function sendAudioToServer(audioBlob) {
            const url = `http://${laptopIp}:${port}/audio`;
            const formData = new FormData();
            formData.append('audio', audioBlob, 'voice.wav');

            fetch(url, {
                method: 'POST',
                mode: 'cors',
                body: formData
            })
            .then(res => res.text())
            .then(text => {
                if(text && text !== "IGNORED" && text !== "ERROR") {
                    log("[Команда на ПК]: " + text);
                }
            })
            .catch(err => {
                log("Зв'язок з ПК заблоковано браузером. Потрібно налаштувати CORS.", true);
            });
        }

        function log(msg, isError = false) {
            const p = document.createElement('p');
            p.className = isError ? 'log error' : 'log';
            p.innerText = msg;
            consoleDiv.appendChild(p);
        }
    </script>
</body>
</html>
