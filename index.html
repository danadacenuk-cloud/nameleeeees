<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовий Термінал</title>
    <style>
        body { background-color: black; color: #00FF00; font-family: monospace; padding: 20px; }
        #status { color: yellow; font-weight: bold; font-size: 1.2em; margin-bottom: 15px; }
        .log { margin: 5px 0; }
        .error { color: red; }
        .success { color: #00FF00; }
    </style>
</head>
<body>
    <div id="status">Мікрофон активний. Говорите...</div>
    <div id="console"></div>

    <script>
        const laptopIp = '100.72.222.179'; 
        const port = '6752';

        const statusDiv = document.getElementById('status');
        const consoleDiv = document.getElementById('console');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            log('Браузер не підтримує розпізнавання мови.', true);
        } else {
            var recognition = new SpeechRecognition();
            // Вмикаємо постійний режим, щоб мікрофон не вирубався після кожного слова
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'ru-RU'; 

            recognition.onstart = () => { statusDiv.innerText = "Мікрофон працює стабільно. Слухаю..."; };
            recognition.onerror = (event) => { log('Помилка мікрофона: ' + event.error, true); };
            
            // Прибираємо скажений автоперезапуск onend, тепер він перезапуститься тільки якщо реально впав
            recognition.onend = () => { 
                setTimeout(() => { try { recognition.start(); } catch(e){} }, 1000); 
            };

            recognition.onresult = (event) => {
                const resultIndex = event.resultIndex;
                const text = event.results[resultIndex][0].transcript.trim();
                sendToServer(text);
            };
            
            try { recognition.start(); } catch(e){}
        }

        function log(message, isError = false, isSuccess = false) {
            const p = document.createElement('p');
            if (isError) p.className = 'log error';
            else if (isSuccess) p.className = 'log success';
            else p.className = 'log';
            p.innerText = message;
            consoleDiv.appendChild(p);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function sendToServer(speechText) {
            const url = `http://${laptopIp}:${port}/`;
            const formData = new URLSearchParams();
            formData.append('text', speechText);

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(response => response.text())
            .then(data => {
                if (data === 'OK') {
                    log('[Команда]: ' + speechText, false, true);
                }
            })
            .catch(error => {
                // Виводимо ТІЛЬКИ чисту системну помилку, без моєї відсебеньки про IP
                log('Системна помилка: ' + error.message, true);
            });
        }
    </script>
</body>
</html>
